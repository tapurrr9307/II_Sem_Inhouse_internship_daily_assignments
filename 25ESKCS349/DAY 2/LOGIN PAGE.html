<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapurShop - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4e54c8,#8f94fb);
}

/* Header */

header{
    background:#ffffff;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#4e54c8;
}

nav a{
    text-decoration:none;
    color:#333;
    margin-left:25px;
    font-size:18px;
}

nav a:hover{
    color:#4e54c8;
}

/* Login Box */

.container{
    width:420px;
    background:#fff;
    margin:60px auto;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.container h2{
    text-align:center;
    color:#4e54c8;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input[type="email"],
input[type="password"]{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    border:2px solid #4e54c8;
    outline:none;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#4e54c8;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    background:#4e54c8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#303f9f;
}

.signup{
    text-align:center;
    margin-top:20px;
}

.signup a{
    text-decoration:none;
    color:#4e54c8;
    font-weight:bold;
}

/* Footer */

footer{
    background:#ffffff;
    text-align:center;
    padding:15px;
    margin-top:40px;
    color:#555;
}

</style>

</head>

<body>

<header>

<div class="logo">🛒 TapurShop</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Categories</a>
<a href="#">Contact</a>
</nav>

</header>

<div class="container">

<h2>Login to TapurShop</h2>

<form>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<div class="options">

<label>
<input type="checkbox"> Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">Login</button>

<div class="signup">
<p>Don't have an account?
<a href="#">Create Account</a></p>
</div>

</form>

</div>

<footer>

<p>© 2026 TapurShop | Shop Smart, Shop Easy</p>

</footer>

</body>
</html>
