<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#74ebd5,#9face6);
}

/* Heading */
h1{
    text-align:center;
    color:white;
    margin-top:30px;
    margin-bottom:20px;
    font-size:38px;
}

/* Registration Box */
.container{
    width:500px;
    background:#fff;
    margin:40px auto;
    padding:30px;
    border:4px solid #003366;
    border-radius:15px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

/* Form Heading */
.container h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #999;
    border-radius:6px;
}

input:focus,
select:focus,
textarea:focus{
    border:2px solid #0066cc;
    outline:none;
}

.gender{
    margin-top:10px;
}

.gender input{
    width:auto;
    margin-right:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    background:#003366;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

footer{
    text-align:center;
    margin-top:30px;
    color:white;
    padding:15px;
}

</style>

</head>

<body>

<h1>ABC College Admission Portal</h1>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter Full Name">

<label>Email</label>
<input type="email" placeholder="Enter Email">

<label>Phone Number</label>
<input type="text" placeholder="Enter Phone Number">

<label>Date of Birth</label>
<input type="date">

<label>Course</label>
<select>
<option>Select Course</option>
<option>B.Tech</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Com</option>
<option>MCA</option>
</select>

<label>Gender</label>

<div class="gender">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
</div>

<label>Address</label>
<textarea rows="4" placeholder="Enter Address"></textarea>

<label>Password</label>
<input type="password" placeholder="Enter Password">

<label>Confirm Password</label>
<input type="password" placeholder="Confirm Password">

<button type="submit">Register</button>

</form>

</div>

<footer>
© 2026 ABC College | All Rights Reserved
</footer>

</body>
</html>
